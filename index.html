<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlideShow Downloads</title>
    <style>
      body {
        margin: 0;
        font-family: Segoe UI, Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrap {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .card {
        background: #111827;
        border: 1px solid #374151;
        border-radius: 12px;
        padding: 20px;
      }
      a {
        color: #93c5fd;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .muted {
        color: #94a3b8;
      }
      ul {
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>SlideShow Desktop</h1>
      <p class="muted">Download latest Electron build artifacts.</p>

      <section class="card">
        <h2>Downloads</h2>
        <div id="content" class="muted">Loading links...</div>
      </section>
    </main>

    <script>
      const repo = "victordoshenko/SlideShow";
      const releasesUrl = `https://github.com/${repo}/releases`;

      async function loadManifest() {
        const candidates = ["./latest-electron.json", "./frontend/public/latest-electron.json"];
        for (const url of candidates) {
          try {
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) continue;
            return await response.json();
          } catch (_) {}
        }
        return null;
      }

      function renderFallback() {
        const content = document.getElementById("content");
        content.innerHTML = `Links are not available yet. <a href="${releasesUrl}" target="_blank" rel="noreferrer">Open GitHub Releases</a>.`;
      }

      function renderManifest(manifest) {
        const content = document.getElementById("content");
        const parts = Array.isArray(manifest?.partDownloadUrls) ? manifest.partDownloadUrls : [];
        if (parts.length === 0) {
          renderFallback();
          return;
        }
        const partLinks = parts
          .map((url, i) => `<li><a href="${url}" target="_blank" rel="noreferrer">Download part ${i + 1}</a></li>`)
          .join("");
        content.innerHTML = `
          <p><a href="#" id="launcher-link">Download auto-extract launcher (.cmd)</a></p>
          ${parts.length ? `<ul>${partLinks}</ul>` : ""}
          <p class="muted">Download all parts to one folder, run the .cmd, then start SlideShow.exe.</p>
        `;
        const launcherLink = document.getElementById("launcher-link");
        if (launcherLink) {
          launcherLink.addEventListener("click", (event) => {
            event.preventDefault();
            const partNames = parts
              .map((url) => {
                const tail = (url.split("/").pop() || "").split("?")[0];
                return decodeURIComponent(tail);
              })
              .filter(Boolean);
            if (partNames.length === 0) {
              return;
            }
            const archiveBase = partNames[0].replace(/\.\d{3}$/i, "");
            const copyList = partNames.map((name) => `"${name}"`).join("+");
            const cmd = [
              "@echo off",
              "setlocal",
              `set "ARCHIVE_BASE=${archiveBase}"`,
              `set "COPY_LIST=${copyList}"`,
              "set \"WORK_ZIP=%TEMP%\\%ARCHIVE_BASE%\"",
              "set \"TARGET_DIR=%~dp0%ARCHIVE_BASE%\"",
              "if exist \"%WORK_ZIP%\" del /f /q \"%WORK_ZIP%\" >nul 2>nul",
              "echo Combining multi-volume archive...",
              "copy /b %COPY_LIST% \"%WORK_ZIP%\" >nul",
              "if errorlevel 1 (",
              "  echo Failed to combine archive parts. Ensure all parts are in this folder.",
              "  pause",
              "  exit /b 1",
              ")",
              "echo Extracting archive...",
              "powershell -NoProfile -ExecutionPolicy Bypass -Command \"Expand-Archive -LiteralPath '%WORK_ZIP%' -DestinationPath '%TARGET_DIR%' -Force\"",
              "if errorlevel 1 (",
              "  echo Extraction failed.",
              "  pause",
              "  exit /b 1",
              ")",
              "del /f /q \"%WORK_ZIP%\" >nul 2>nul",
              "echo Done. Extracted to:",
              "echo %TARGET_DIR%",
              "pause",
              "",
            ].join("\r\n");
            const blob = new Blob([cmd], { type: "application/octet-stream" });
            const objectUrl = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = objectUrl;
            a.download = `${archiveBase}.extract.cmd`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(objectUrl);
          });
        }
      }

      loadManifest().then((manifest) => {
        if (manifest) {
          renderManifest(manifest);
        } else {
          renderFallback();
        }
      });
    </script>
  </body>
</html>
